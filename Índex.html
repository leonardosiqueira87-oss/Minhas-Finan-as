<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanças Siqueira</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Finanças%20Siqueira%22,%22short_name%22:%22Finanças%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#ffffff%22,%22theme_color%22:%22#059669%22}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="bg-gray-100 font-sans pb-10">
    <header class="bg-emerald-600 text-white p-6 shadow-lg mb-6 sticky top-0 z-10">
        <h1 class="text-xl font-bold text-center">Controle Financeiro</h1>
    </header>

    <div class="max-w-md mx-auto px-4 space-y-4">
        <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-emerald-500">
            <p class="text-gray-500 text-xs uppercase font-bold tracking-wider">Saldo Atual</p>
            <p id="saldoTotal" class="text-3xl font-black text-emerald-700">R$ 0,00</p>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm space-y-3">
            <input id="desc" type="text" placeholder="Descrição (ex: Venda Stone)" class="w-full p-4 border rounded-xl bg-gray-50 text-lg">
            <input id="val" type="number" inputmode="decimal" placeholder="Valor (R$)" class="w-full p-4 border rounded-xl bg-gray-50 text-lg">
            <div class="grid grid-cols-2 gap-3">
                <button onclick="add('entrada')" class="bg-emerald-600 text-white font-bold p-4 rounded-xl shadow-md active:bg-emerald-700">Entrada</button>
                <button onclick="add('saida')" class="bg-red-500 text-white font-bold p-4 rounded-xl shadow-md active:bg-red-600">Saída</button>
            </div>
        </div>

        <div id="lista" class="space-y-3"></div>
    </div>

    <script>
        let transacoes = JSON.parse(localStorage.getItem('financas_siqueira')) || [];
        
        function atualizar() {
            const lista = document.getElementById('lista');
            lista.innerHTML = '';
            let total = 0;
            
            transacoes.forEach((t, i) => {
                total += t.tipo === 'entrada' ? t.valor : -t.valor;
                lista.innerHTML += `
                    <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                        <div>
                            <p class="font-bold text-gray-800">${t.desc}</p>
                            <p class="text-[10px] text-gray-400 uppercase font-bold">${t.data}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-bold ${t.tipo==='entrada'?'text-emerald-600':'text-red-600'}">
                                ${t.tipo==='entrada'?'+':'-'} R$ ${t.valor.toFixed(2)}
                            </span>
                            <button onclick="del(${i})" class="bg-gray-100 text-gray-400 w-8 h-8 rounded-full flex items-center justify-center font-bold">×</button>
                        </div>
                    </div>`;
            });
            document.getElementById('saldoTotal').innerText = `R$ ${total.toFixed(2)}`;
            localStorage.setItem('financas_siqueira', JSON.stringify(transacoes));
        }

        function add(tipo) {
            const desc = document.getElementById('desc').value;
            const valor = parseFloat(document.getElementById('val').value);
            if(!desc || !valor) return alert("Por favor, preencha a descrição e o valor.");
            transacoes.unshift({ desc, valor, tipo, data: new Date().toLocaleDateString('pt-BR') });
            document.getElementById('desc').value = '';
            document.getElementById('val').value = '';
            atualizar();
        }

        function del(i) { 
            if(confirm("Deseja apagar este registro?")) {
                transacoes.splice(i, 1); 
                atualizar(); 
            }
        }
        atualizar();
    </script>
</body>
</html>
